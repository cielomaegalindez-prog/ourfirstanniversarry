<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1st Anniversary</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- Envelope -->
<div class="scene" id="scene">
    <div class="envelope" onclick="openEnvelope(event)">
        <div class="flap"></div>
        <div class="base"></div>
    </div>
    <div class="hint">💌 Click to Open Your Letter</div>
</div>

<!-- Letter -->
<div class="container" id="letterBox">
    <h1>First Anniversary</h1>
    <div id="letter"></div>
    <div class="signature">— Always yours, Eli</div>
</div>

<script src="script.js"></script>

</body>
</html>
